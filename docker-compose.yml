services:
  http-backend:
    build:
      context: .
      dockerfile: apps/http-backend/Dockerfile
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "3002:3002"
    environment:
      NODE_ENV: production
      HTTP_PORT: ${HTTP_PORT:-3002}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:postgres@host.docker.internal:5432/whiteboard}
